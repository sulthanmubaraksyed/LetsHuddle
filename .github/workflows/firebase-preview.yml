name: Firebase Preview Channel on PR

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync secrets from GitHub → Firebase Secret Manager
        env:
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          set_secret() {
            local name=$1
            local value=$2
            # Create secret if it doesn't exist
            if ! gcloud secrets describe "$name" --project="$PROJECT_ID" &>/dev/null; then
              echo "Creating secret: $name"
              gcloud secrets create "$name" --project="$PROJECT_ID" --replication-policy="automatic"
            fi
            # Add new version with latest value
            echo -n "$value" | gcloud secrets versions add "$name" --project="$PROJECT_ID" --data-file=-
            echo "✓ $name synced"
          }

          set_secret "VITE_FIREBASE_API_KEY"            "$VITE_FIREBASE_API_KEY"
          set_secret "VITE_FIREBASE_AUTH_DOMAIN"        "$VITE_FIREBASE_AUTH_DOMAIN"
          set_secret "VITE_FIREBASE_PROJECT_ID"         "$VITE_FIREBASE_PROJECT_ID"
          set_secret "VITE_FIREBASE_STORAGE_BUCKET"     "$VITE_FIREBASE_STORAGE_BUCKET"
          set_secret "VITE_FIREBASE_MESSAGING_SENDER_ID" "$VITE_FIREBASE_MESSAGING_SENDER_ID"
          set_secret "VITE_FIREBASE_APP_ID"             "$VITE_FIREBASE_APP_ID"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d
