runConfig:
  runtime: nodejs20
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3
  concurrency: 100

# Environment variables — set actual values in Firebase Console:
# App Hosting → letshuddlesvc → Settings → Environment variables
# OR run: firebase apphosting:secrets:grantaccess <SECRET_NAME> --project genai-fa4f5
env:
  - variable: VITE_FIREBASE_API_KEY
    secret: VITE_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    secret: VITE_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_PROJECT_ID
    secret: VITE_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    secret: VITE_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    secret: VITE_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_APP_ID
    secret: VITE_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
